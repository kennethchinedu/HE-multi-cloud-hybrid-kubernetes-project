apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kyverno

  source:
    repoURL: https://github.com/kennethchinedu/HA-multi-cloud-k8s-project.git
    targetRevision: main
    path: platform/policies/

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true       # Remove resources deleted from Git
      selfHeal: true    # Revert manual changes made outside Git
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Required for Kyverno CRDs (large annotations)
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
