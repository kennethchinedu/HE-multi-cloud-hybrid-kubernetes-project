apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Kyverno policy engine and security policies

  # Only pull from this repository
  sourceRepos:
    - https://github.com/kennethchinedu/HA-multi-cloud-k8s-project.git
    - https://kyverno.github.io/kyverno/

  destinations:
    - namespace: kyverno
      server: https://kubernetes.default.svc
    # Policies deploy into default and cluster-scope
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: "*"
      server: https://kubernetes.default.svc

  # Allow Kyverno CRDs and policy resources cluster-wide
  clusterResourceWhitelist:
    - group: "*"
      kind: ClusterPolicy
    - group: "*"
      kind: ClusterRole
    - group: "*"
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: kyverno-admin
      description: Full access to kyverno project
      policies:
        - p, proj:kyverno:kyverno-admin, applications, *, kyverno/*, allow
