apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: default
  labels:
    app: frontend-app
    dev: frontend
    team: devops
spec:
  selector:
    matchLabels:
      app: frontend-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
        #      # nodeSelector:
        #      #   node: worker
      imagePullSecrets:
        - name: reposecret
      containers:
        - name: frontend
          image: anamskenneth/frontend:2025-07-24
          imagePullPolicy: IfNotPresent
          # resources:
            # requests:
              # memory: "64Mi"
              # cpu: "50m"
            # limits:
              # memory: "256Mi"
              # cpu: "300m"
          env:
            - name: PORT
              value: "8080"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "product-catalog-service:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "currency-service:7000"
            - name: CART_SERVICE_ADDR
              value: "cart-service:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "recommendation-service:8080"
            - name: SHIPPING_SERVICE_ADDR
              value: "shipping-service:50051"
            - name: CHECKOUT_SERVICE_ADDR
              value: "checkout-service:5050"
            - name: AD_SERVICE_ADDR
              value: "ads-service:9555"
          ports:
            - containerPort: 8080
              name: frontend-port
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          # tolerations:
          #   - key: "workload"
          #     operator: "Equal"
          #     value: "general"
          #     effect: "NoSchedule"
          # nodeSelector:
          #   workload: general
          volumeMounts:
            - name: localvolume
              mountPath: /etc/localdev
      volumes:
        - name: localvolume
          hostPath:
            path: /etc/app

---

