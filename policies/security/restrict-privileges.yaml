---
# Blocks containers from running as root user
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Containers running as root have full control over the host if they
      escape the container. This policy blocks any container that does not
      explicitly set runAsNonRoot=true or sets runAsUser=0.
spec:
  validationFailureAction: Audit   # Change to Enforce to block violations
  background: true
  rules:
    - name: check-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must not run as root. Set runAsNonRoot: true or runAsUser > 0."
        pattern:
          spec:
            containers:
              - (name): "*"
                securityContext:
                  runAsNonRoot: true

---
# Blocks privileged containers (equivalent to root on the host)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      Privileged containers share the host kernel and can bypass all
      container isolation. This policy blocks any pod that requests
      privileged mode.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            containers:
              - (name): "*"
                securityContext:
                  privileged: "false | nil"


