argo-cd:
  # -- Install CRDs (keep true on first install)
  crds:
    install: true
    keep: true

  global:
    # Reduce replica counts to fit the learning cluster resources
    replicaCount: 2

  server:
    replicaCount: 2
    # Expose ArgoCD UI via NodePort so it's reachable from your machine
    # Access at http://192.168.56.11:30080 (or whichever worker it lands on)
    service:
      type: NodePort
      nodePortHttp: 30080
      nodePortHttps: 30443

  applicationSet:
    replicaCount: 2

  controller:
    replicaCount: 2

  redis:
    enabled: true

  # dex:
  #   # Disable SSO/dex for local dev — saves ~100Mi RAM
  #   enabled: false

  notifications:
    enabled: false
